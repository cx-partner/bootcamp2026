---
site_name: "2026 Webex Contact Center Partner Bootcamp - Partner Pre-requisites" 
site_description: "Proactive Debt Collection and Contention resolution"
site_author: Luis Garcia Delgado, Juan Corral, Sebastian Hernandez, Stephanie Ross
site_url: https://cx-partner.github.io/bootcamp2026/pre-req/
copyright: Copyright &copy; 2026 Cisco
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexesmkd
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy
    - toc.follow
    - toc.integrate
   
  custom_dir: docs/overrides
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: template_assets/webexLogo91.png
  favicon: template_assets/webex75.png
extra:
  generator: false
  repo: "https://github.com/cx-partner/bootcamp2026"
  site_event: test
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - template_assets/js/newLoad.js
  - template_assets/js/setInfo.js
plugins:
  - search
  - exclude:
      glob:
        - "lab*.md"             # Exclude all files in the root
        - "overview.md"        # Exclude all files in the docs folder
        - "conclusion.md"
      ignore:
        - "index.md"      # EXCEPT the pre-req page (Whitelist)
        - "pre_req_wxcc.md"    
        - "pre_req_email_channel.md"
        - "pre_req_airtable.md"
  
  # - with-pdf:
  #     cover_title: LABXXX-1234
  #     cover_subtitle: My famous WebexOne Lab
  #     cover_logo: template_assets/Wx1_25_PDF_image.jpg
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: false
      skip_classes:
      - custom-skip-class-name
      auto_caption: true
      caption_position: top
markdown_extensions:
  - md_in_html
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - tables
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true  # Makes them look much better (Material style)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true    
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.keys
  - toc:
      permalink: true
      toc_depth: 3

  

nav:
  - Home: index.md
#  - Readme:
#      - 2026 WxCC Bootcamp: overview.md
  - Pre-requisites: 
    - Partner Tenant: 
      - pre_req_wxcc.md
